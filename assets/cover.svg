<svg width="1280" height="720" viewBox="0 0 1280 720" role="img" xmlns="http://www.w3.org/2000/svg">
<title>claude-pulse — status line + smart notifications for Claude Code in the terminal</title>
<desc>Aurora purple-to-orange background framing a dark terminal showing the claude-pulse status line, a notification popping over it, a curl install command bar, and the repo link.</desc>
<defs>
<linearGradient id="base" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
<stop offset="0" stop-color="#5b3a8c"/>
<stop offset="0.32" stop-color="#9b4a9e"/>
<stop offset="0.58" stop-color="#d15a86"/>
<stop offset="0.8" stop-color="#e8845c"/>
<stop offset="1" stop-color="#f4b878"/>
</linearGradient>
<radialGradient id="blobP" cx="0.12" cy="0.1" r="0.55">
<stop offset="0" stop-color="#8a5cc0" stop-opacity="0.75"/>
<stop offset="1" stop-color="#8a5cc0" stop-opacity="0"/>
</radialGradient>
<radialGradient id="blobB" cx="0.04" cy="0.9" r="0.55">
<stop offset="0" stop-color="#5566d8" stop-opacity="0.6"/>
<stop offset="1" stop-color="#5566d8" stop-opacity="0"/>
</radialGradient>
<radialGradient id="blobO" cx="0.97" cy="0.24" r="0.6">
<stop offset="0" stop-color="#f4a85a" stop-opacity="0.65"/>
<stop offset="1" stop-color="#f4a85a" stop-opacity="0"/>
</radialGradient>
<linearGradient id="scrim" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#0a0a12" stop-opacity="0.5"/>
<stop offset="1" stop-color="#0a0a12" stop-opacity="0"/>
</linearGradient>
</defs>
<rect width="1280" height="720" fill="url(#base)"/>
<rect width="1280" height="720" fill="url(#blobP)"/>
<rect width="1280" height="720" fill="url(#blobB)"/>
<rect width="1280" height="720" fill="url(#blobO)"/>
<rect width="1280" height="260" fill="url(#scrim)"/>
<text x="110" y="66" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="600" letter-spacing="1" fill="#ffffff" opacity="0.85">open source  ·  for Claude Code in the terminal</text>
<text x="106" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="64" font-weight="800" fill="#ffffff">Claude Code,</text>
<text x="106" y="204" font-family="system-ui,-apple-system,sans-serif" font-size="64" font-weight="800" fill="#ffffff">now with a <tspan fill="#ff9d72">pulse.</tspan></text>
